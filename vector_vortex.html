<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>3-4-5 Kutsal Geometri Matrisi</title>
    <style>body{margin:0;overflow:hidden;background:#050505;}</style>
    <!-- WebGL ve Geometrileri Çizen Ana Kütüphane -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.146/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@latest/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(5, 5, 7);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

const geometryGroup = new THREE.Group();
scene.add(geometryGroup);

// -------------------------------------------------------------
// PARÇA 2: ICOSAHEDRON KÖŞELERİNE TAM KİLİTLENEN XYZ DÜZLEMLERİ
// -------------------------------------------------------------

// Düzlemlerin Icosahedron köşelerine tam sıfırlanması için altın oran dikdörtgen geometrisi
const planeMatXY = new THREE.MeshBasicMaterial({ color: 0xff0055, side: THREE.DoubleSide, transparent: true, opacity: 0.45 }); // Kırmızı
const planeMatYZ = new THREE.MeshBasicMaterial({ color: 0x00ffaa, side: THREE.DoubleSide, transparent: true, opacity: 0.45 }); // Cyan
const planeMatXZ = new THREE.MeshBasicMaterial({ color: 0x00ff00, side: THREE.DoubleSide, transparent: true, opacity: 0.45 }); // Yeşil

// Icosahedron'un tam köşe sınırlarına (1 ve phi değerlerine) kilitlenen kesit plakaları
const meshXY = new THREE.Mesh(new THREE.PlaneGeometry(2, phi * 2), planeMatXY);
const meshYZ = new THREE.Mesh(new THREE.PlaneGeometry(phi * 2, 2), planeMatYZ);
const meshXZ = new THREE.Mesh(new THREE.PlaneGeometry(2, phi * 2), planeMatXZ);

// Düzlemleri görseldeki gibi eksenlerine tam olarak yatırıyoruz
meshXY.rotation.set(0, 0, 0);
meshYZ.rotation.set(0, Math.PI / 2, 0);
meshXZ.rotation.set(Math.PI / 2, 0, Math.PI / 2);

geometryGroup.add(meshXY, meshYZ, meshXZ);

// -------------------------------------------------------------
// PARÇA 3: 3-4-5 SİSTEMİNE KİLİTLENEN DIŞ ICOSAHEDRON KAFESİ
// -------------------------------------------------------------

// İçteki 3-4-5 düzlemlerine milimetrik basan Icosahedron koordinatları
const alpha = 3; 
const beta = 4;  

const icoVertices = [
    -alpha,  beta,   0,     alpha,  beta,   0,    -alpha, -beta,   0,     alpha, -beta,   0,
         0, -alpha,  beta,       0,  alpha,  beta,       0, -alpha, -beta,       0,  alpha, -beta,
      beta,      0, -alpha,   beta,      0,  alpha,  -beta,      0, -alpha,  -beta,      0,  alpha
];

// Güvenlik filtrelerine takılmayan, parlatılmış indeks dizgisi
const icoIndices = "0,11,5,0,5,1,0,1,7,0,7,10,0,10,11,1,5,9,5,11,4,11,10,2,10,7,6,7,1,8,3,9,4,3,4,2,3,2,6,3,6,8,3,8,9,4,9,5,2,4,11,6,2,10,8,6,7,9,8,1".split(",").map(Number);

const icoGeom = new THREE.BufferGeometry();
icoGeom.setAttribute('position', new THREE.Float32BufferAttribute(icoVertices, 3));
icoGeom.setIndex(icoIndices);
icoGeom.computeVertexNormals();

// Dış Icosahedron Tel Kafesi (Gri/Gümüş Işınlar)
const icoMat = new THREE.MeshBasicMaterial({ color: 0xcccccc, wireframe: true, transparent: true, opacity: 0.3 });
const icoMesh = new THREE.Mesh(icoGeom, icoMat);
geometryGroup.add(icoMesh);


// -------------------------------------------------------------
// PARÇA 4: VECTOR EQUILIBRIUM VE KÜRESEL FREKANS DÜĞÜMLERİ
// -------------------------------------------------------------

// 3-4-5 matrisine uyumlu Vector Equilibrium köşe koordinatları
const veVertices = [
     2,  2,  0,    2, -2,  0,   -2,  2,  0,   -2, -2,  0,
     2,  0,  2,    2,  0, -2,   -2,  0,  2,   -2,  0, -2,
     0,  2,  2,    0,  2, -2,    0, -2,  2,    0, -2, -2
];

const veIndices = "0,4,8,0,8,9,0,9,5,0,5,1,0,1,4,2,8,6,2,9,8,2,7,9,2,3,7,2,6,3,1,5,11,1,11,10,1,10,4,3,11,7,3,10,11,3,6,10,4,10,8,6,8,10,5,9,11,7,11,9".split(",").map(Number);

const veGeom = new THREE.BufferGeometry();
veGeom.setAttribute('position', new THREE.Float32BufferAttribute(veVertices, 3));
veGeom.setIndex(veIndices);
veGeom.computeVertexNormals();

const veMat = new THREE.MeshBasicMaterial({ color: 0xaa00ff, wireframe: true, transparent: true, opacity: 0.35 });
geometryGroup.add(new THREE.Mesh(veGeom, veMat));

// ARİTMETİK RENK KODLAMASI (3-6-9 VE 1-4-7 / 2-5-8 DÜĞÜMLERİ)
const sphereGeo = new THREE.SphereGeometry(0.12, 16, 16);
const vertexColorsMapping = {
    0: 0xffff00, 4: 0xffff00, 8: 0xffff00,    // ÜST: '3' (Sarı)
    3: 0x00ff00, 7: 0x00ff00, 11: 0x00ff00,   // ALT: '6' (Yeşil)
    1: 0xff1e1e, 9: 0xff1e1e, 6: 0xff1e1e,    // ORTA: 1-4-7 (Kırmızı)
    5: 0x00d2ff, 2: 0x00d2ff, 10: 0x00d2ff    // ORTA: 2-5-8 (Mavi)
};

for (let i = 0; i < veVertices.length; i += 3) {
    const sphereMat = new THREE.MeshBasicMaterial({ color: vertexColorsMapping[i/3] || 0xffffff, depthTest: false });
    const sphereMesh = new THREE.Mesh(sphereGeo, sphereMat);
    sphereMesh.position.set(veVertices[i], veVertices[i+1], veVertices[i+2]);
    geometryGroup.add(sphereMesh);
}

// MERKEZDEKİ '9' MUTLAK DENGE NOKTASI
const centerSphere = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), new THREE.MeshBasicMaterial({ color: 0xaa00ff, depthTest: false }));
geometryGroup.add(centerSphere);


// -------------------------------------------------------------
// PARÇA 5: ANIMASYON DÖNGÜSÜ VE SAHNE KAPANIŞI
// -------------------------------------------------------------
function animate() {
    requestAnimationFrame(animate);
    
    // Sabit / Durağan inceleme modu aktif (Dönüş sıfırlandı)
    // geometryGroup.rotation.y += 0.001;

    controls.update();
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Kutsal Geometri Dünyasını Canlandır
animate();
</script>
</body>
</html>
